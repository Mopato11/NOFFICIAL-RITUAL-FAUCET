<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Secret Faucet</title>
    <style>
        :root {
            --ritual-green: #00ff88;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* خلفية سوداء عميقة */
            font-family: 'Courier New', Courier, monospace;
            color: white;
            overflow: hidden;
        }

        /* الكاهن الغامض (The Ritual Shaman) */
        .shaman-silhouette {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 400px;
            background: url('https://www.svgrepo.com/show/396266/wizard.svg'); /* أيقونة ساحر */
            background-repeat: no-repeat;
            background-position: bottom;
            filter: invert(1) drop-shadow(0 0 20px var(--ritual-green));
            opacity: 0.8;
            z-index: 2;
            animation: ritual-move 4s infinite alternate;
        }

        @keyframes ritual-move {
            0% { transform: translateX(-50%) scale(1); opacity: 0.6; }
            100% { transform: translateX(-50%) scale(1.05); opacity: 1; }
        }

        /* النيران الخضراء الكثيفة */
        .fire-container {
            position: fixed;
            bottom: -20px;
            width: 100%;
            height: 300px;
            z-index: 3;
            pointer-events: none;
            display: flex;
            justify-content: space-around;
        }

        .flame {
            width: 80px;
            height: 80px;
            background: var(--ritual-green);
            border-radius: 50% 50% 20% 50%;
            transform: rotate(-45deg);
            filter: blur(15px);
            opacity: 0.6;
            animation: blaze 2s infinite alternate;
            box-shadow: 0 0 50px var(--ritual-green);
        }

        @keyframes blaze {
            0% { transform: rotate(-45deg) scale(1) translateY(0); opacity: 0.5; }
            100% { transform: rotate(-45deg) scale(1.5) translateY(-50px); opacity: 0.9; }
        }

        /* واجهة المستخدم */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 50px;
            height: 100vh;
            background: radial-gradient(circle, transparent, rgba(0,0,0,0.9));
        }

        .ritual-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--ritual-green);
            box-shadow: 0 0 30px var(--ritual-green);
            margin-bottom: 15px;
        }

        .card {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--ritual-green);
            padding: 30px;
            text-align: center;
            width: 350px;
            backdrop-filter: blur(10px);
        }

        input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid var(--ritual-green);
            color: var(--ritual-green);
            margin: 20px 0;
            box-sizing: border-box;
            outline: none;
        }

        .claim-btn {
            width: 100%;
            padding: 15px;
            background: var(--ritual-green);
            color: black;
            font-weight: bold;
            border: none;
            cursor: pointer;
            display: none; /* مخفي حتى كتابة الكلمة */
        }

        .claim-btn:hover { background: white; }

    </style>
</head>
<body>

    <!-- الكاهن -->
    <div class="shaman-silhouette"></div>

    <!-- النيران الخضراء -->
    <div class="fire-container" id="flameLayer"></div>

    <div class="content">
        <!-- الشعار الذي طلبته -->
        <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo">
        
        <h1 style="color: var(--ritual-green); letter-spacing: 5px;">RITUAL FAUCET</h1>
        
        <div class="card">
            <p>The Shaman awaits the word...</p>
            <input type="text" id="word" placeholder="Type gritual..." oninput="check()">
            <button id="btn" class="claim-btn" onclick="finish()">CLAIM EVREY TOKEN</button>
            <p style="font-size: 10px; color: #555; margin-top: 10px;">Waiting for anthor ritual</p>
        </div>
    </div>

    <script>
        // إنشاء نيران كثيفة برمجياً
        const layer = document.getElementById('flameLayer');
        for (let i = 0; i < 20; i++) {
            let f = document.createElement('div');
            f.className = 'flame';
            f.style.left = Math.random() * 100 + '%';
            f.style.animationDelay = Math.random() * 2 + 's';
            f.style.width = Math.random() * 60 + 40 + 'px';
            layer.appendChild(f);
        }

        function check() {
            const val = document.getElementById('word').value.toLowerCase();
            const btn = document.getElementById('btn');
            if(val === "gritual") {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        }

        function finish() {
            alert("The ritual is complete! Tokens sent.");
        }
    </script>
</body>
</html>
