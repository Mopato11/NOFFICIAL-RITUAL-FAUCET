<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Gate - Official Faucet</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        :root { --ritual-green: #00ff88; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #050505; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* تأثير البرق */
        #lightning-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        .main-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative; z-index: 10; }
        
        /* الشعار المشتعل */
        .ritual-logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--ritual-green); box-shadow: 0 0 40px var(--ritual-green); animation: pulse 3s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.1); filter: brightness(1.4); } }
        
        /* بطاقة الفوسيت */
        .faucet-card { background: rgba(0, 0, 0, 0.9); border: 1px solid var(--ritual-green); padding: 40px; width: 350px; text-align: center; backdrop-filter: blur(10px); border-radius: 10px; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        
        input { width: 100%; padding: 15px; background: #000; border: none; border-bottom: 2px solid var(--ritual-green); color: white; font-size: 18px; text-align: center; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        
        /* الزر */
        .btn-claim { width: 100%; padding: 18px; background: var(--ritual-green); color: black; font-weight: bold; border: none; cursor: pointer; display: none; text-transform: uppercase; border-radius: 5px; font-size: 16px; transition: 0.3s; }
        .btn-claim:hover { background: white; box-shadow: 0 0 30px white; }
        
        /* الشموع */
        .candles-row { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; z-index: 2; }
        .candle { width: 15px; height: 50px; background: #111; position: relative; }
        .flame { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 10px; height: 20px; background: var(--ritual-green); border-radius: 50%; filter: blur(1px); animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { from { opacity: 0.8; transform: translateX(-50%) scale(1); } to { opacity: 1; transform: translateX(-50%) scale(1.2); } }
    </style>
</head>
<body>

    <canvas id="lightning-canvas"></canvas>

                setTimeout(() => { document.body.style.backgroundColor = '#050505'; }, 50);
            }
            requestAnimationFrame(drawLightning);
        }
