<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Lightning Faucet</title>
    <style>
        :root {
            --ritual-green: #00ff88;
            --dark-bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* تأثير البرق الأخضر */
        .lightning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            z-index: 99;
            pointer-events: none;
        }

        /* الشعار المشع والمتحرك */
        .logo-container {
            position: relative;
            margin-bottom: 40px;
            animation: float 4s infinite ease-in-out;
        }

        .main-logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--ritual-green);
            box-shadow: 0 0 50px var(--ritual-green), inset 0 0 30px var(--ritual-green);
            z-index: 10;
            position: relative;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); filter: brightness(1); }
            50% { transform: translateY(-20px) rotate(5deg); filter: brightness(1.5); }
        }

        /* تصميم الشموع البرمجية */
        .candles-row {
            display: flex;
            gap: 100px;
            position: absolute;
            bottom: 20px;
        }

        .candle {
            width: 20px;
            height: 80px;
            background: #1a1a1a;
            position: relative;
            border-radius: 2px;
        }

        .flame {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 25px;
            background: var(--ritual-green);
            border-radius: 50% 50% 20% 20%;
            filter: blur(2px);
            box-shadow: 0 0 15px var(--ritual-green);
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-55%) scale(1); opacity: 0.8; }
            100% { transform: translateX(-45%) scale(1.1); opacity: 1; }
        }

        /* خانة الإدخال الاحترافية */
        .faucet-ui {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--ritual-green);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 100px rgba(0, 255, 136, 0.1);
            width: 400px;
            text-align: center;
            z-index: 20;
        }

        .input-group {
            position: relative;
            margin: 30px 0;
        }

        input {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--ritual-green);
            color: white;
            font-size: 20px;
            text-align: center;
            outline: none;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        input:focus {
            border-bottom: 2px solid white;
            text-shadow: 0 0 10px var(--ritual-green);
        }

        /* زر المطالبة */
        .btn-ritual {
            background: var(--ritual-green);
            color: black;
            padding: 18px 40px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            display: none;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.3);
        }

        .btn-ritual:hover {
            transform: scale(1.05);
            background: white;
            box-shadow: 0 0 40px white;
        }

    </style>
</head>
<body>

    <div class="lightning" id="lightningFlash"></div>

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
        
        <div class="logo-container">
            <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="main-logo">
        </div>

        <div class="faucet-ui">
            <h1 style="margin: 0; letter-spacing: 8px; color: var(--ritual-green);">RITUAL</h1>
            <p style="color: #666; font-size: 12px; margin-top: 10px;">HARNESS THE GREEN POWER</p>
            
            <div class="input-group">
                <input type="text" id="userInput" placeholder="ENTER SECRET WORD" oninput="check()">
            </div>

            <button id="claimBtn" class="btn-ritual" onclick="startRitual()">CLAIM EVREY TOKEN</button>
            <p style="font-size: 10px; color: #333; margin-top: 20px;">ANTHOR BLOCKCHAIN IS RISING</p>
        </div>

        <!-- شموع في الأسفل -->
        <div class="candles-row">
            <div class="candle"><div class="flame"></div></div>
            <div class="candle"><div class="flame"></div></div>
            <div class="candle"><div class="flame"></div></div>
            <div class="candle"><div class="flame"></div></div>
            <div class="candle"><div class="flame"></div></div>
        </div>
    </div>

    <script>
        // كود ضربات البرق الأخضر العشوائية
        function strike() {
            const flash = document.getElementById('lightningFlash');
            const chance = Math.random();
            if (chance > 0.97) {
                flash.style.background = "rgba(0, 255, 136, 0.4)";
                flash.style.opacity = "1";
                setTimeout(() => { flash.style.opacity = "0"; }, 50);
                setTimeout(() => { flash.style.opacity = "0.8"; }, 100);
                setTimeout(() => { flash.style.opacity = "0"; }, 200);
            }
            requestAnimationFrame(strike);
        }
        strike();

        function check() {
            const val = document.getElementById('userInput').value.toLowerCase();
            const btn = document.getElementById('claimBtn');
            btn.style.display = (val === "gritual") ? "block" : "none";
        }

        function startRitual() {
            const flash = document.getElementById('lightningFlash');
            flash.style.background = "white";
            flash.style.opacity = "1";
            setTimeout(() => { 
                flash.style.opacity = "0";
                alert("The ritual was successful! Check your wallet for evrey token.");
            }, 500);
        }
    </script>
</body>
</html>
