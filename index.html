<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Genesis Gate</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        :root { --ritual-green: #00ff88; --dark-bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--dark-bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* تأثير البرق المتطور */
        #lightning-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; opacity: 0.7; }
        
        .main-content { position: relative; z-index: 10; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        /* الشعار المتوهج */
        .ritual-logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--ritual-green); box-shadow: 0 0 30px var(--ritual-green); animation: pulse 2.5s infinite ease-in-out; margin-bottom: 25px; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px var(--ritual-green); transform: scale(1); } 50% { box-shadow: 0 0 50px var(--ritual-green); transform: scale(1.05); } }
        
        /* بطاقة الفوسيت الزجاجية */
        .faucet-card { background: rgba(0, 0, 0, 0.9); border: 1px solid var(--ritual-green); padding: 40px; width: 360px; text-align: center; backdrop-filter: blur(15px); border-radius: 20px; box-shadow: 0 10px 60px rgba(0,0,0,1); }
        
        h1 { font-size: 1.6rem; letter-spacing: 5px; margin: 0 0 15px 0; color: var(--ritual-green); text-shadow: 0 0 10px var(--ritual-green); }
        
        .network-info { font-size: 10px; color: #888; margin-bottom: 20px; background: #111; padding: 8px; border-radius: 5px; border: 1px solid #222; }

        input { width: 100%; padding: 15px; background: #000; border: none; border-bottom: 2px solid var(--ritual-green); color: white; font-size: 18px; text-align: center; margin-bottom: 25px; outline: none; transition: 0.3s; }
        input:focus { background: #0a0a0a; border-bottom-color: white; }
        
        .btn-claim { width: 100%; padding: 18px; background: var(--ritual-green); color: black; font-weight: 900; border: none; cursor: pointer; display: none; text-transform: uppercase; border-radius: 8px; font-size: 16px; box-shadow: 0 5px 15px rgba(0,255,136,0.3); }
        .btn-claim:hover { background: white; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,255,255,0.4); }
        
        /* الشموع */
        .candles-row { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; z-index: 5; padding-bottom: 10px; }
        .candle { width: 10px; height: 45px; background: #111; position: relative; border-radius: 2px; }
        .flame { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 8px; height: 20px; background: var(--ritual-green); border-radius: 50% 50% 20% 20%; filter: blur(1px); animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { from { opacity: 0.7; transform: translateX(-50%) scale(1); } to { opacity: 1; transform: translateX(-50%) scale(1.15); } }

        #status-text { font-size: 12px; margin-top: 15px; color: #555; }
    </style>
</head>
<body>

    <canvas id="lightning-canvas"></canvas>

    <div class="main-content">
        <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo">
        
        <div class="faucet-card">
            <h1>RITUAL GATE</h1>
            <div class="network-info">
                Network: Ritual (ID: 1979)<br>
                <span id="userBalance">Balance: Checking...</span>
            </div>
            
            <input type="text" id="passInput" placeholder="TYPE gritual..." oninput="checkKey()">
            <button id="claimBtn" class="btn-claim" onclick="igniteRitual()">IGNITE 0.005 RITL</button>
            
            <div id="status-text">Awaiting Ritualist...</div>
        </div>
    </div>

    <div class="candles-row" id="candleRack"></div>

    <script>
        // 1. الرسوميات (البرق والشموع)
        const canvas = document.getElementById('lightning-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        
        function draw() {
            ctx.fillStyle = 'rgba(5,5,5,0.15)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            if(Math.random() > 0.96) {
                ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 2; ctx.beginPath();
                let x = Math.random()*canvas.width; ctx.moveTo(x, 0);
                for(let i=0; i<8; i++) ctx.lineTo(x+(Math.random()-0.5)*70, (canvas.height/8)*(i+1));
                ctx.stroke();
            }
            requestAnimationFrame(draw);
        }
        draw();

        const rack = document.getElementById('candleRack');
        for(let i=0; i<18; i++) rack.innerHTML += '<div class="candle"><div class="flame"></div></div>';

        // 2. البرمجة (الربط مع محفظتك المشحونة)
        function checkKey() {
            const val = document.getElementById('passInput').value.toLowerCase().trim();
            document.getElementById('claimBtn').style.display = (val === "gritual") ? "block" : "none";
        }

        async function igniteRitual() {
            const btn = document.getElementById('claimBtn');
            const status = document.getElementById('status-text');
            const balLabel = document.getElementById('userBalance');

            if (!window.ethereum) return alert("Please install MetaMask!");

            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                
                // التأكد من أن المستخدم على الشبكة الصحيحة (1979)
                const { chainId } = await provider.getNetwork();
                if (chainId !== 1979) {
                    alert("Switch MetaMask to Ritual Network (ID: 1979) first!");
                    return;
                }

                const accounts = await provider.send("eth_requestAccounts", []);
                const myAddress = accounts[0];
                
                // إظهار الرصيد
                const balance = await provider.getBalance(myAddress);
                const eth = ethers.utils.formatEther(balance);
                balLabel.innerText = "Balance: " + eth + " RITL";

                btn.disabled = true;
                btn.innerText = "TRANSMITTING...";
                status.innerText = "Please confirm the send in MetaMask...";

                // تنفيذ الإرسال من محفظتك الحالية (التي بها 0.017)
                const signer = provider.getSigner();
                const tx = await signer.sendTransaction({
                    to: myAddress, // يرسل لنفسه كاختبار (يمكنك تغيير العنوان هنا)
                    value: ethers.utils.parseEther("0.005")
                });

                status.innerText = "Ritual in progress... waiting for block.";
                await tx.wait();

                alert("SUCCESS! Ritual complete.");
                btn.innerText = "SUCCESSFUL";
                status.innerText = "Energy dispensed.";
            } catch (err) {
                console.error(err);
                status.style.color = "#ff4444";
                status.innerText = "Failed: No funds in MetaMask or user cancelled.";
                btn.disabled = false;
                btn.innerText = "RETRY";
            }
        }

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
