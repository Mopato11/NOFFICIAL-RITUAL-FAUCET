<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Mystical Faucet</title>
    <style>
        :root {
            --ritual-green: #00ff88;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* حاوية الطقوس */
        .ritual-scene {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 1;
        }

        /* رسم الكاهن بالكود (The Shaman Silhouette) */
        .shaman {
            position: relative;
            width: 120px;
            height: 250px;
            background: #000;
            z-index: 5;
            filter: drop-shadow(0 0 15px var(--ritual-green));
            animation: ritual-sway 3s infinite alternate ease-in-out;
        }

        /* الرأس */
        .shaman::before {
            content: '';
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 60px;
            background: #000;
            border-radius: 50% 50% 0 0;
        }

        /* اليدين المرفوعتين للسماء */
        .shaman::after {
            content: '';
            position: absolute;
            top: -20px;
            left: -40px;
            width: 200px;
            height: 100px;
            border-top: 15px solid #000;
            border-left: 15px solid #000;
            border-right: 15px solid #000;
            border-radius: 50% 50% 0 0;
            z-index: -1;
        }

        @keyframes ritual-sway {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-10px) scale(1.05); }
        }

        /* النيران الخضراء الكثيفة (برمجية) */
        .flame-wrap {
            position: absolute;
            bottom: 0;
            display: flex;
            gap: 5px;
        }

        .green-flame {
            width: 40px;
            height: 150px;
            background: linear-gradient(to top, var(--ritual-green), transparent);
            border-radius: 50% 50% 0 0;
            filter: blur(10px);
            opacity: 0.6;
            animation: burn 1.5s infinite alternate;
        }

        @keyframes burn {
            0% { height: 100px; opacity: 0.4; transform: scaleX(1); }
            100% { height: 250px; opacity: 0.8; transform: scaleX(1.5); }
        }

        /* واجهة المستخدم */
        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--ritual-green);
            box-shadow: 0 0 20px var(--ritual-green);
            margin-bottom: 10px;
        }

        .faucet-card {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--ritual-green);
            padding: 30px;
            width: 320px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        input {
            width: 100%;
            padding: 10px;
            background: #111;
            border: 1px solid var(--ritual-green);
            color: var(--ritual-green);
            margin: 15px 0;
            box-sizing: border-box;
            outline: none;
            text-align: center;
        }

        .claim-btn {
            width: 100%;
            padding: 15px;
            background: var(--ritual-green);
            color: black;
            font-weight: bold;
            border: none;
            cursor: pointer;
            display: none;
        }

        .claim-btn:hover { background: white; }

    </style>
</head>
<body>

    <div class="ui-layer">
        <!-- شعارك المفضل -->
        <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="logo">
        <h2 style="color: var(--ritual-green); letter-spacing: 4px;">RITUAL CEREMONY</h2>

        <div class="faucet-card">
            <p>The Shaman raises his hands...</p>
            <p style="font-size: 12px; color: #888;">Type gritual to ignite the ritual</p>
            <input type="text" id="userInput" placeholder="..." oninput="check()">
            <button id="claimBtn" class="claim-btn" onclick="done()">CLAIM EVREY TOKEN</button>
            <p style="font-size: 10px; margin-top: 10px; color: #444;">Prepare for anthor drop</p>
        </div>
    </div>

    <!-- مشهد الكاهن والنيران -->
    <div class="ritual-scene">
        <div class="flame-wrap" id="flamesContainer"></div>
        <div class="shaman"></div>
    </div>

    <script>
        // توليد نيران كثيفة حول الكاهن
        const container = document.getElementById('flamesContainer');
        for (let i = 0; i < 30; i++) {
            let f = document.createElement('div');
            f.className = 'green-flame';
            f.style.animationDelay = Math.random() * 2 + 's';
            f.style.opacity = Math.random();
            container.appendChild(f);
        }

        function check() {
            const val = document.getElementById('userInput').value.toLowerCase();
            const btn = document.getElementById('claimBtn');
            if(val === "gritual") {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        }

        function done() {
            alert("The ritual is successful! Check your wallet for evrey token.");
        }
    </script>
</body>
</html>
