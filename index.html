<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Testnet - Daily Faucet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --ritual-green: #00ff88; }
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .card { background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); padding: 40px; border: 2px solid var(--ritual-green); border-radius: 10px; width: 380px; box-shadow: 0 0 50px rgba(0,255,136,0.2); position: relative; z-index: 10; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--ritual-green); color: var(--ritual-green); margin: 20px 0; text-align: center; outline: none; box-sizing: border-box; font-weight: bold; }
        .btn { width: 100%; padding: 18px; background: var(--ritual-green); color: black; font-weight: 900; border: none; cursor: pointer; display: none; text-transform: uppercase; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: white; box-shadow: 0 0 30px white; }
        .ritual-logo { width: 110px; border-radius: 50%; border: 3px solid var(--ritual-green); margin-bottom: 20px; box-shadow: 0 0 30px var(--ritual-green); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <canvas id="lightning"></canvas>
    <div class="card">
        <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo">
        <h2 style="letter-spacing: 3px; margin: 0;">DAILY RITUAL</h2>
        <p style="font-size: 11px; color: #888; margin-top: 5px;">Claim 0.005 RITL evrey 24 hours</p>
        
        <input type="text" id="ritualKey" placeholder="Type 'gritual'..." oninput="checkInput()">
        
        <button id="claimBtn" class="btn" onclick="requestEnergy()">IGNITE RITUAL</button>
        
        <p id="status" style="font-size: 10px; color: var(--ritual-green); margin-top: 15px;"></p>
        <p style="font-size: 9px; color: #444; margin-top: 10px;">ANTHOR DROP IS COMING SOON</p>
    </div>

    <script>
        // عنوان عقدك الذي أنشأته للتو
        const CONTRACT_ADDRESS = "0x429874E97ACa04a5f26b4E37d736E6c32F0B279D"; 
        const ABI = ["function mintRitual() public"];

        function checkInput() {
            const val = document.getElementById('ritualKey').value.toLowerCase();
            const btn = document.getElementById('claimBtn');
            btn.style.display = (val === 'gritual') ? 'block' : 'none';
        }

        async function requestEnergy() {
            if (!window.ethereum) return alert("Please install MetaMask!");
            
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                
                // التأكد من الشبكة الصحيحة (Ritual Testnet)
                const network = await provider.getNetwork();
                if (network.chainId !== 139 && network.chainId !== 0x8B) {
                    alert("Please switch your MetaMask to Ritual Testnet!");
                    return;
                }

                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                
                const btn = document.getElementById('claimBtn');
                const status = document.getElementById('status');
                
                btn.innerText = "SUMMONING...";
                btn.disabled = true;
                status.innerText = "Invoking the smart contract...";

                const tx = await contract.mintRitual();
                status.innerText = "Transaction sent! Waiting for confirmation...";
                
                await tx.wait();
                
                alert("Success! 0.005 RITL has been sent to your wallet.\nCome back after anthor 24 hours.");
                btn.innerText = "SUCCESSFUL";
                btn.style.background = "#fff";
                status.innerText = "Ritual Complete.";

            } catch (err) {
                console.error(err);
                let msg = "Ritual failed.";
                if (err.message.includes("Wait")) msg = "Wait for anthor 24 hours!";
                if (err.message.includes("empty")) msg = "Faucet is empty, refill needed.";
                
                alert(msg);
                document.getElementById('claimBtn').disabled = false;
                document.getElementById('claimBtn').innerText = "IGNITE RITUAL";
                document.getElementById('status').innerText
