<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ritual Final Gate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --neon: #00ff88; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { position: relative; z-index: 10; background: #000; border: 2px solid var(--neon); padding: 30px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); }
        .logo { width: 90px; border-radius: 50%; border: 2px solid var(--neon); margin-bottom: 20px; box-shadow: 0 0 15px var(--neon); }
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 10px; text-align: center; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--neon); color: black; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        #status { font-size: 11px; margin-top: 15px; color: var(--neon); opacity: 0.7; }
        /* الشموع والبرق بشكل مبسط لعدم إثقال الصفحة */
        .bg-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #00ff8811 0%, #000 70%); z-index: 1; }
    </style>
</head>
<body>
    <div class="bg-effect"></div>
    <div class="card">
        <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="logo">
        <h2 style="letter-spacing: 3px;">RITUAL GATE</h2>
        
        <input type="text" id="address" placeholder="Recipient (0x...)">
        <input type="text" id="pass" placeholder="Password: gritual">
        
        <button class="btn" onclick="run()">IGNITE RITUAL</button>
        
        <div id="status">System Ready</div>
    </div>

    <script>
        // البيانات الصارمة
        const KEY = "a9946a7810401a1555f0399ff8d28ca19822506fd7a6b969ee3de11761e40d95";
        const RPC = "https://rpc.ritualfoundation.org/"; 

        async function run() {
            const addr = document.getElementById('address').value.trim();
            const pass = document.getElementById('pass').value.toLowerCase().trim();
            const status = document.getElementById('status');

            if (pass !== "gritual") return alert("Wrong Password!");
            if (!ethers.utils.isAddress(addr)) return alert("Invalid Address!");

            try {
                status.innerText = "Connecting to Ritual...";
                // محاولة الاتصال المباشر عند الضغط لتجنب التعليق عند التحميل
                const provider = new ethers.providers.JsonRpcProvider(RPC);
                const wallet = new ethers.Wallet(KEY, provider);

                status.innerText = "Sending 0.005 RITL...";
                const tx = await wallet.sendTransaction({
                    to: addr,
                    value: ethers.utils.parseUnits("0.005", "ether")
                });

                status.innerText = "Success! Hash: " + tx.hash.substring(0,12);
                alert("DONE! Transaction Sent.");
            } catch (e) {
                console.error(e);
                status.innerText = "Error: Check Balance or Internet.";
                alert("Failed! Make sure the wallet has RITL.");
            }
        }
    </script>
</body>
</html>
