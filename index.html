<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Official Faucet</title>
    <style>
        :root {
            --ritual-green: #00ff88;
            --dark-bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden; /* لمنع التمرير وضمان بقاء النيران خلفية */
        }

        /* خلفية النيران الشاملة */
        .fire-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 255, 136, 0.2), transparent);
            z-index: -1;
        }

        /* جزيئات النيران المشتعلة في كل مكان */
        .flame-particle {
            position: absolute;
            bottom: -100px;
            background: var(--ritual-green);
            border-radius: 50%;
            filter: blur(15px);
            opacity: 0.5;
            animation: rise 5s infinite ease-in;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.5; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        /* حاوية المحتوى الرئيسي */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            z-index: 10;
            position: relative;
        }

        /* شعار Ritual بتصميم عصري */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .ritual-logo {
            font-size: 100px;
            font-weight: 900;
            letter-spacing: -5px;
            background: linear-gradient(to bottom, #ffffff, var(--ritual-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 255, 136, 0.6));
            margin: 0;
        }

        .subtitle {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--ritual-green);
            margin-top: -10px;
            font-weight: bold;
        }

        /* كرت الفوسيت */
        .faucet-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); /* تأثير الزجاج الضبابي */
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 40px;
            border-radius: 25px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--ritual-green);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin: 20px 0;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 15px var(--ritual-green);
        }

        .claim-button {
            width: 100%;
            padding: 15px;
            background: var(--ritual-green);
            border: none;
            border-radius: 12px;
            color: black;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            display: none; /* يظهر فقط عند كتابة الكلمة */
            transition: 0.3s;
        }

        .claim-button:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        .instruction {
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- خلفية النيران -->
    <div class="fire-bg" id="fireContainer"></div>

    <div class="main-content">
        <div class="logo-container">
            <h1 class="ritual-logo">RITUAL</h1>
            <div class="subtitle">Unofficial Faucet</div>
        </div>

        <div class="faucet-box">
            <p>Prove you are part of the ritual</p>
            <p class="instruction">Type "gritual" to ignite the faucet</p>
            
            <input type="text" id="passInput" placeholder="Enter secret word..." oninput="check()">
            
            <button id="btn" class="claim-button" onclick="claim()">Claim evrey token</button>
        </div>
    </div>

    <script>
        // كود لتوليد جزيئات النيران في الخلفية بشكل عشوائي
        const container = document.getElementById('fireContainer');
        for (let i = 0; i < 30; i++) {
            let particle = document.createElement('div');
            particle.className = 'flame-particle';
            
            // مواقع وأحجام عشوائية
            let size = Math.random() * 60 + 20 + 'px';
            particle.style.width = size;
            particle.style.height = size;
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = Math.random() * 3 + 2 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            
            container.appendChild(particle);
        }

        function check() {
            const input = document.getElementById('passInput').value.toLowerCase();
            const btn = document.getElementById('btn');
            if (input === "gritual") {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        }

        function claim() {
            alert("The ritual has begun! Check anthor transaction soon.");
        }
    </script>
</body>
</html>
