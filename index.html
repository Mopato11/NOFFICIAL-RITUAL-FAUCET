<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Shaman Faucet</title>
    <style>
        :root {
            --ritual-green: #00ff88;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: white;
            font-family: 'Cinzel', serif;
            overflow: hidden;
        }

        /* خلفية الكاهن مع حركة واقعية */
        .shaman-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.ibb.co/6RTPZ0S/N6p34ztp.jpg') no-repeat center center;
            background-size: cover;
            z-index: -2;
            animation: background-pulse 8s infinite alternate ease-in-out;
        }

        @keyframes background-pulse {
            0% { transform: scale(1); filter: brightness(0.7) hue-rotate(0deg); }
            100% { transform: scale(1.05); filter: brightness(1) hue-rotate(10deg); }
        }

        /* طبقة النيران الخضراء المتطايرة */
        .fire-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent, rgba(0, 255, 136, 0.1));
            z-index: -1;
            pointer-events: none;
        }

        /* واجهة المستخدم */
        .main-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        /* شعار Ritual الدائري */
        .ritual-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--ritual-green);
            box-shadow: 0 0 30px var(--ritual-green);
            margin-bottom: 20px;
            background: #000;
        }

        .faucet-box {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--ritual-green);
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
        }

        h1 {
            color: var(--ritual-green);
            letter-spacing: 5px;
            font-size: 1.6rem;
            margin-bottom: 20px;
            text-shadow: 0 0 15px var(--ritual-green);
        }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid var(--ritual-green);
            color: white;
            font-size: 18px;
            text-align: center;
            margin-bottom: 25px;
            outline: none;
            box-sizing: border-box;
        }

        .claim-button {
            width: 100%;
            padding: 18px;
            background: var(--ritual-green);
            color: black;
            font-weight: bold;
            border: none;
            cursor: pointer;
            display: none;
            text-transform: uppercase;
            font-size: 1.1rem;
        }

        .claim-button:hover {
            background: white;
            box-shadow: 0 0 30px white;
        }

        .particle {
            position: absolute;
            background: var(--ritual-green);
            border-radius: 50%;
            filter: blur(5px);
            opacity: 0.6;
            animation: rise 5s infinite linear;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-100vh) scale(2); opacity: 0; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="shaman-background"></div>
    <div class="fire-overlay" id="particleContainer"></div>

    <div class="main-ui">
        <!-- شعار Ritual من صفحتهم الرسمية -->
        <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo">
        
        <div class="faucet-box">
            <h1>UNOFFICIAL FAUCET</h1>
            <p style="color: #888; font-size: 14px;">The shaman is calling evrey builder.</p>
            
            <input type="text" id="magicInput" placeholder="Type gritual..." oninput="verify()">
            
            <button id="claimBtn" class="claim-button" onclick="alert('Transaction sent!')">Claim evrey token</button>
            
            <p style="color: #444; font-size: 10px; margin-top: 15px;">Waiting for anthor drop</p>
        </div>
    </div>

    <script>
        // إنشاء جزيئات نيران خضراء تطير فوق صورة الكاهن
        const container = document.getElementById('particleContainer');
        for (let i = 0; i < 30; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            let size = Math.random() * 30 + 10 + 'px';
            p.style.width = size;
            p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.bottom = "-50px";
            p.style.animationDuration = Math.random() * 3 + 2 + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(p);
        }

        function verify() {
            const val = document.getElementById('magicInput').value.toLowerCase();
            const btn = document.getElementById('claimBtn');
            if (val === "gritual") {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        }
    </script>
</body>
</html>
