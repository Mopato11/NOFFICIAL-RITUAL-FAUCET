<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ritual Check</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
</head>
<body style="background:#000; color:#0f8; font-family:monospace; padding:50px; text-align:center;">
    <div style="border:1px solid #0f8; padding:20px; display:inline-block;">
        <h2>🔍 فحص المحفظة</h2>
        <p id="addr">جاري استخراج العنوان...</p>
        <p id="bal">جاري فحص الرصيد...</p>
    </div>

    <script>
        // هذا هو المفتاح الذي أعطيتني إياه
        const KEY = "a9946a7810401a1555f0399ff8d28ca19822506fd7a6b969ee3de11761e40d95";
        const provider = new ethers.providers.JsonRpcProvider("https://rpc.ritual.net");
        
        async function check() {
            try {
                const wallet = new ethers.Wallet(KEY, provider);
                const balance = await provider.getBalance(wallet.address);
                
                document.getElementById('addr').innerHTML = "<b>العنوان المرتبط بمفتاحك:</b><br>" + wallet.address;
                document.getElementById('bal').innerHTML = "<b>الرصيد في هذا العنوان:</b><br>" + ethers.utils.formatEther(balance) + " RITL";
            } catch (e) {
                document.getElementById('bal').innerText = "خطأ في الاتصال بالشبكة";
            }
        }
        check();
    </script>
</body>
</html>
