<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Gate - The Original</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        :root {
            --ritual-green: #00ff88;
            --dark-bg: #050505;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--dark-bg);
            color: white; font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* البرق الأخضر المتموج */
        #lightning-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        .main-content {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; position: relative; z-index: 10;
        }

        /* الشعار النابض */
        .logo-container {
            margin-bottom: 30px;
            animation: pulse 3s infinite ease-in-out;
        }

        .ritual-logo {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid var(--ritual-green);
            box-shadow: 0 0 50px var(--ritual-green);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.5) drop-shadow(0 0 30px var(--ritual-green)); }
        }

        /* البطاقة الزجاجية */
        .faucet-card {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--ritual-green);
            padding: 40px; width: 360px; text-align: center;
            backdrop-filter: blur(15px); border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        input {
            width: 100%; padding: 15px; background: #000;
            border: none; border-bottom: 2px solid var(--ritual-green);
            color: white; font-size: 18px; text-align: center;
            margin-bottom: 20px; outline: none; box-sizing: border-box;
        }

        /* الزر المشتعل */
        .btn-claim {
            width: 100%; padding: 16px; background: var(--ritual-green);
            color: black; font-weight: 900; border: none; cursor: pointer;
            display: none; text-transform: uppercase; border-radius: 5px;
            transition: 0.3s; letter-spacing: 1px;
        }

        .btn-claim:hover { background: white; box-shadow: 0 0 30px white; }

        /* الشموع المشتعلة في الأسفل */
        .candles-container {
            position: fixed; bottom: 0; width: 100%;
            display: flex; justify-content: space-around; z-index: 2;
        }

        .candle { width: 15px; height: 45px; background: #111; position: relative; }
        .flame {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 10px; height: 18px; background: var(--ritual-green);
            border-radius: 50% 50% 20% 20%; filter: blur(1px);
            animation: flicker 0.1s infinite alternate; box-shadow: 0 0 10px var(--ritual-green);
        }

        @keyframes flicker {
            from { transform: translateX(-50%) scale(1); opacity: 0.8; }
            to { transform: translateX(-52%) scale(1.2); opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="lightning-canvas"></canvas>

    <div class="main-content">
        <div class="logo-container">
            <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo">
        </div>

        <div class="faucet-card">
            <h1 style="color: var(--ritual-green); font-size: 1.4rem; letter-spacing: 4px; margin: 0;">RITUAL ENERGY</h1>
            <p style="font-size: 10px; color: #666; margin-top: 5px;">0.005 RITL EVERY 24 HOURS</p>
            
            <input type="text" id="userInput" placeholder="TYPE gritual..." oninput="checkKey()">
            
            <button id="claimBtn" class="btn-claim" onclick="executeRitual()">CLAIM ENERGY</button>
            
            <p id="log" style="font-size: 11px; color: var(--ritual-green); margin-top: 15px;"></p>
        </div>
    </div>

    <div class="candles-container" id="candleRack"></div>

    <script>
        // 1. نظام البرق الأصلي
        const canvas = document.getElementById('lightning-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        function drawLightning() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (Math.random() > 0.96) {
                let x = Math.random() * canvas.width;
                ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(x, 0);
                for (let i = 0; i < 12; i++) {
                    x += (Math.random() - 0.5) * 50;
                    ctx.lineTo(x, (canvas.height / 12) * (i + 1));
                }
                ctx.stroke();
                document.body.style.backgroundColor = '#0a1a11';
                setTimeout(() => { document.body.style.backgroundColor = '#050505'; }, 60);
            }
            requestAnimationFrame(drawLightning);
        }
        drawLightning();

        // 2. إنشاء الشموع
        const rack = document.getElementById('candleRack');
        for (let i = 0; i < 15; i++) {
            rack.innerHTML += '<div class="candle"><div class="flame"></div></div>';
        }

        // 3. التحقق من كلمة gritual
        function checkKey() {
            const val = document.getElementById('userInput').value.toLowerCase().trim();
            const btn = document.getElementById('claimBtn');
            btn.style.display = (val === "gritual") ? "block" : "none";
        }

        // 4. الربط بالعقد الذكي (البلوكشين)
        const CONTRACT_ADDRESS = "0x429874E97ACa04a5f26b4E37d736E6c32F0B279D";
        const ABI = ["function mintRitual() public"];

        async function executeRitual() {
            if (!window.ethereum) return alert("Install MetaMask!");
            
            const btn = document.getElementById('claimBtn');
            const log = document.getElementById('log');

            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

                btn.disabled = true;
                btn.innerText = "WAITING...";
                log.innerText = "Confirming ritual in MetaMask...";

                const tx = await contract.mintRitual();
                log.innerText = "Ritual in progress... Burning nodes.";
                await tx.wait();

                alert("Success! The energy has been distributed.");
                btn.innerText = "SUCCESSFUL";
                log.innerText = "Ritual Complete. Wait 24h.";
            } catch (err) {
                console.error(err);
                alert("Ritual Failed! Check 24h limit or gas.");
                btn.disabled = false;
                btn.innerText = "CLAIM ENERGY";
                log.innerText = "";
            }
        }

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
