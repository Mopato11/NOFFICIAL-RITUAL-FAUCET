<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Ultimate Faucet</title>
    <style>
        :root {
            --ritual-green: #00ff88;
            --fire-shadow: rgba(0, 255, 136, 0.5);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Cinzel', serif;
            color: white;
            overflow: hidden;
        }

        /* الخلفية: الشخص الذي يلبس لباس الطقوس ويرفع يديه */
        .shaman-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* صورة تعبيرية قوية لشخص يرفع يديه للسماء */
            background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, transparent 50%),
                        url('https://cdn.pixabay.com/photo/2017/08/15/15/44/magic-2644400_1280.jpg');
            background-size: cover;
            background-position: center;
            z-index: -2;
            filter: hue-rotate(90deg) brightness(0.8); /* تحويل الألوان للأخضر السحري */
        }

        /* طبقة النيران الخضراء المتصاعدة */
        .fire-particles {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 80%);
        }

        /* الشعار المطلوب */
        .ritual-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--ritual-green);
            box-shadow: 0 0 40px var(--ritual-green);
            margin-bottom: 20px;
            position: relative;
            z-index: 20;
        }

        h1 {
            letter-spacing: 10px;
            color: var(--ritual-green);
            text-shadow: 0 0 20px var(--ritual-green);
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .faucet-box {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--ritual-green);
            padding: 40px;
            border-radius: 0; /* حواف حادة لأسلوب الطقوس */
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
            backdrop-filter: blur(8px);
            width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--ritual-green);
            color: var(--ritual-green);
            padding: 15px;
            font-size: 18px;
            text-align: center;
            margin: 20px 0;
            outline: none;
            box-sizing: border-box;
        }

        .claim-btn {
            width: 100%;
            padding: 15px;
            background: var(--ritual-green);
            color: #000;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .claim-btn:hover {
            background: #fff;
            box-shadow: 0 0 30px #fff;
        }

        /* حركة النيران الجزيئية */
        .particle {
            position: absolute;
            background: var(--ritual-green);
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0.5;
            animation: rise infinite linear;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.5; }
            100% { transform: translateY(-100vh) scale(2); opacity: 0; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="shaman-bg"></div>
    <div class="fire-particles" id="fireContainer"></div>

    <div class="main-content">
        <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo">
        
        <h1>RITUAL FAUCET</h1>
        <p style="color: #888; letter-spacing: 3px;">UNOFFICIAL COMMUNITY NODE</p>

        <div class="faucet-box">
            <p>The ritual needs a word to begin...</p>
            <input type="text" id="inputWord" placeholder="Enter 'gritual'" oninput="check()">
            <button id="claimBtn" class="claim-btn" onclick="start()">Claim evrey token</button>
            <p style="font-size: 10px; margin-top: 15px; color: #555;">Anthor claim available in 24h</p>
        </div>
    </div>

    <script>
        // توليد النيران المتحركة
        const container = document.getElementById('fireContainer');
        for (let i = 0; i < 50; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            let size = Math.random() * 50 + 10 + 'px';
            p.style.width = size;
            p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.bottom = "-50px";
            p.style.animationDuration = Math.random() * 4 + 2 + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(p);
        }

        function check() {
            const val = document.getElementById('inputWord').value.toLowerCase();
            const btn = document.getElementById('claimBtn');
            if (val === "gritual") {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        }

        function start() {
            alert("Evrey drop is being sent to your wallet!");
        }
    </script>
</body>
</html>
