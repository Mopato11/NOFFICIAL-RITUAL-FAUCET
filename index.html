<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Unofficial Faucet</title>
    <style>
        :root {
            --ritual-green: #00ff88;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* لمنع التمرير وجعل النيران تملأ الشاشة */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* حاوية النيران الخلفية */
        .fire-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            z-index: 1;
            pointer-events: none; /* لكي لا تعيق الضغط على الأزرار */
        }

        /* تصميم الشعبي المشتعل في كل مكان */
        .flame {
            width: 80px;
            height: 150px;
            background: linear-gradient(to top, var(--ritual-green), transparent);
            border-radius: 50% 50% 20% 50%;
            filter: blur(15px);
            animation: burn 2s infinite alternate;
            opacity: 0.6;
            transform-origin: bottom;
        }

        @keyframes burn {
            0% { transform: scaleY(1) skewX(5deg); opacity: 0.5; }
            50% { transform: scaleY(1.5) skewX(-5deg); opacity: 0.8; }
            100% { transform: scaleY(1.2) skewX(2deg); opacity: 0.6; }
        }

        /* المحتوى الأساسي فوق النيران */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .faucet-card {
            background: rgba(0, 0, 0, 0.85); /* خلفية سوداء شفافة لرؤية النيران خلفها */
            padding: 50px;
            border: 3px solid var(--ritual-green);
            border-radius: 20px;
            box-shadow: 0 0 50px var(--ritual-green);
            max-width: 450px;
            color: white;
        }

        h1 {
            color: var(--ritual-green);
            text-transform: uppercase;
            font-size: 2rem;
            margin: 0 0 10px 0;
            text-shadow: 0 0 15px var(--ritual-green);
        }

        .subtitle {
            font-size: 0.9rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        input {
            background: transparent;
            border: 2px solid var(--ritual-green);
            padding: 15px;
            color: var(--ritual-green);
            width: 100%;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.1rem;
            box-sizing: border-box;
        }

        button {
            background: var(--ritual-green);
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
            display: none;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 30px var(--ritual-green);
            transform: scale(1.02);
        }

        .status {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <!-- نيران في كل مكان خلفية -->
    <div class="fire-bg">
        <div class="flame" style="animation-delay: 0.1s; width: 120px;"></div>
        <div class="flame" style="animation-delay: 0.5s; width: 100px;"></div>
        <div class="flame" style="animation-delay: 0.3s; width: 140px;"></div>
        <div class="flame" style="animation-delay: 0.7s; width: 110px;"></div>
        <div class="flame" style="animation-delay: 0.2s; width: 130px;"></div>
        <div class="flame" style="animation-delay: 0.9s; width: 150px;"></div>
    </div>

    <div class="content">
        <div class="faucet-card">
            <h1>RITUAL</h1>
            <div class="subtitle">UNOFFICIAL FAUCET</div>
            
            <p>Prove you are part of the community</p>
            
            <input type="text" id="answer" placeholder="Type 'gritual' to start the fire..." oninput="check()">
            
            <button id="claimBtn" onclick="send()">Claim evrey token</button>
            
            <div id="statusMsg" class="status">Waiting for the magic word...</div>
        </div>
    </div>

    <script>
        function check() {
            const val = document.getElementById('answer').value.toLowerCase();
            const btn = document.getElementById('claimBtn');
            const msg = document.getElementById('statusMsg');

            if (val === "gritual") {
                btn.style.display = "block";
                msg.innerText = "The ritual is ready!";
                msg.style.color = "#00ff88";
            } else {
                btn.style.display = "none";
                msg.innerText = "Waiting for the magic word...";
                msg.style.color = "#888";
            }
        }

        function send() {
            alert("Success! Check anthor transaction in your wallet.");
        }
    </script>
</body>
</html>
