<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Mystical Altar</title>
    <style>
        :root {
            --ritual-green: #00ff88;
            --dark-bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* البرق الأخضر */
        .lightning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
        }

        @keyframes flash {
            0%, 90%, 100% { opacity: 0; }
            92% { opacity: 0.3; background-color: var(--ritual-green); }
            94% { opacity: 0.1; }
            96% { opacity: 0.5; background-color: white; }
        }

        .lightning-active {
            animation: flash 5s infinite;
        }

        /* الشعار المشعل */
        .logo-container {
            position: relative;
            margin-bottom: 30px;
        }

        .main-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--ritual-green);
            position: relative;
            z-index: 5;
            box-shadow: 0 0 20px var(--ritual-green);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 0 20px var(--ritual-green); }
            to { transform: scale(1.05); box-shadow: 0 0 40px var(--ritual-green), 0 0 60px #00ff8866; }
        }

        /* الشموع والنيران */
        .candles-container {
            position: absolute;
            width: 100%;
            bottom: 20px;
            display: flex;
            justify-content: space-around;
            padding: 0 50px;
            box-sizing: border-box;
        }

        .candle {
            width: 20px;
            height: 80px;
            background: #1a1a1a;
            position: relative;
            border-radius: 2px;
        }

        .flame {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 25px;
            background: var(--ritual-green);
            border-radius: 50% 50% 20% 20%;
            filter: blur(2px);
            box-shadow: 0 0 15px var(--ritual-green);
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.9; }
            100% { transform: translateX(-52%) scale(1.1); opacity: 1; }
        }

        /* واجهة الإدخال الجميلة */
        .altar-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 10;
        }

        h2 {
            letter-spacing: 6px;
            color: var(--ritual-green);
            margin-top: 0;
            font-weight: 300;
        }

        .input-group {
            position: relative;
            margin: 30px 0;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border: none;
            border-bottom: 2px solid #333;
            color: white;
            font-size: 18px;
            outline: none;
            transition: 0.4s;
            text-align: center;
            letter-spacing: 2px;
        }

        input:focus {
            border-bottom-color: var(--ritual-green);
            background: rgba(0, 255, 136, 0.05);
        }

        .btn-ritual {
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 2px solid var(--ritual-green);
            color: var(--ritual-green);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
            display: none;
        }

        .btn-ritual:hover {
            background: var(--ritual-green);
            color: black;
            box-shadow: 0 0 30px var(--ritual-green);
        }

        /* نيران مشتعلة في الأسفل */
        .floor-fire {
            position: fixed;
            bottom: -50px;
            width: 100%;
            height: 150px;
            background: radial-gradient(ellipse at center, rgba(0, 255, 136, 0.2) 0%, transparent 70%);
            filter: blur(20px);
        }

    </style>
</head>
<body>

    <div class="lightning lightning-active"></div>

    <div class="main-container">
        <div class="altar-card">
            <div class="logo-container">
                <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="main-logo">
            </div>
            
            <h2>RITUAL</h2>
            <p style="color: #666; font-size: 12px;">EVREY BUILDER IS WELCOME</p>

            <div class="input-group">
                <input type="text" id="ritualInput" placeholder="ENTER SECRET WORD" oninput="check()">
            </div>

            <button id="claimBtn" class="btn-ritual" onclick="ignite()">Ignite Ritual</button>
            
            <p style="color: #333; font-size: 10px; margin-top: 20px;">Waiting for anthor block...</p>
        </div>
    </div>

    <!-- الشموع -->
    <div class="candles-container">
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
    </div>

    <div class="floor-fire"></div>

    <script>
        function check() {
            const val = document.getElementById('ritualInput').value.toLowerCase();
            const btn = document.getElementById('claimBtn');
            if(val === "gritual") {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        }

        function ignite() {
            alert("The ritual has begun! Check your wallet for evrey token.");
        }

        // كود لجعل البرق يضرب بشكل عشوائي
        setInterval(() => {
            if(Math.random() > 0.7) {
                document.querySelector('.lightning').style.animation = 'none';
                setTimeout(() => {
                    document.querySelector('.lightning').style.animation = 'flash 0.5s ease-out';
                }, 10);
            }
        }, 3000);
    </script>
</body>
</html>
