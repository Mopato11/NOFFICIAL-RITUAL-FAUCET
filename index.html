<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Gasless Gate</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        :root { --ritual-green: #00ff88; --dark-bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--dark-bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        #lightning-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .main-content { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative; z-index: 10; }
        .ritual-logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--ritual-green); box-shadow: 0 0 50px var(--ritual-green); animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); filter: brightness(1.4); } }
        .faucet-card { background: rgba(0, 0, 0, 0.9); border: 1px solid var(--ritual-green); padding: 40px; width: 360px; text-align: center; backdrop-filter: blur(15px); border-radius: 15px; }
        input { width: 100%; padding: 15px; background: #000; border: none; border-bottom: 2px solid var(--ritual-green); color: white; font-size: 18px; text-align: center; margin-bottom: 20px; outline: none; }
        .btn-claim { width: 100%; padding: 16px; background: var(--ritual-green); color: black; font-weight: 900; border: none; cursor: pointer; display: none; text-transform: uppercase; border-radius: 5px; }
    </style>
</head>
<body>
    <canvas id="lightning-canvas"></canvas>
    <div class="main-content">
        <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo" style="margin-bottom: 20px;">
        <div class="faucet-card">
            <h1 style="color: var(--ritual-green); letter-spacing: 4px; margin: 0;">GASLESS GATE</h1>
            <p style="font-size: 10px; color: #888; margin-bottom: 20px;">0.005 RITL - AUTO DISPATCH</p>
            <input type="text" id="userInput" placeholder="TYPE gritual..." oninput="checkKey()">
            <button id="claimBtn" class="btn-claim" onclick="sendAutomatedTokens()">CLAIM ENERGY</button>
            <p id="log" style="font-size: 11px; color: var(--ritual-green); margin-top: 15px;"></p>
        </div>
    </div>

    <script>
        // تصميم البرق
        const canvas = document.getElementById('lightning-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function draw() {
            ctx.fillStyle = 'rgba(5,5,5,0.1)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            if(Math.random() > 0.96) {
                ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 2; ctx.beginPath();
                let x = Math.random()*canvas.width; ctx.moveTo(x, 0);
                for(let i=0; i<10; i++) ctx.lineTo(x+(Math.random()-0.5)*50, (canvas.height/10)*(i+1));
                ctx.stroke();
            }
            requestAnimationFrame(draw);
        }
        draw();

        function checkKey() {
            const val = document.getElementById('userInput').value.toLowerCase().trim();
            document.getElementById('claimBtn').style.display = (val === "gritual") ? "block" : "none";
        }

        async function sendAutomatedTokens() {
            if (!window.ethereum) return alert("Please install MetaMask!");
            const btn = document.getElementById('claimBtn');
            const log = document.getElementById('log');

            try {
                const userProvider = new ethers.providers.Web3Provider(window.ethereum);
                const accounts = await userProvider.send("eth_requestAccounts", []);
                const userAddress = accounts[0];

                btn.disabled = true;
                btn.innerText = "CONNECTING...";
                log.innerText = "Accessing Ritual Mainframe...";

                // المفتاح الخاص بك
                const PRIVATE_KEY = "a9946a7810401a1555f0399ff8d28ca19822506fd7a6b969ee3de11761e40d95";
                
                // تجربة الـ RPC الرسمي للشبكة
                const rpcProvider = new ethers.providers.JsonRpcProvider("https://rpc.ritual.net");
                const faucetWallet = new ethers.Wallet(PRIVATE_KEY, rpcProvider);

                log.innerText = "Sending 0.005 RITL to your address...";

                const tx = await faucetWallet.sendTransaction({
                    to: userAddress,
                    value: ethers.utils.parseEther("0.005"),
                    gasLimit: 21000 // تحديد حد الغاز لضمان عدم الفشل
                });

                log.innerText = "Ritual Inbound... Waiting for confirmation.";
                await tx.wait();

                alert("ENERGY SUMMONED SUCCESSFULLY!");
                btn.innerText = "SUCCESSFUL";
                log.innerText = "Energy transferred to: " + userAddress.substring(0,6) + "...";

            } catch (err) {
                console.error(err);
                // إظهار الخطأ الحقيقي للمساعدة في الحل
                log.style.color = "red";
                log.innerText = "ERROR: " + (err.reason || "Check Faucet Balance");
                btn.disabled = false;
                btn.innerText = "TRY AGAIN";
            }
        }
    </script>
</body>
</html>
