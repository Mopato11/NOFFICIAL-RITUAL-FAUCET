<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Reality Faucet</title>
    <style>
        :root {
            --ritual-green: #00ff88;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: white;
            font-family: 'Cinzel', serif;
            overflow: hidden;
        }

        /* فيديو الخلفية لجعل المشهد واقعياً */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.6;
            filter: hue-rotate(80deg); /* تحويل أي نيران للأخضر */
        }

        /* طبقة ضبابية ونيران إضافية */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 90%);
            z-index: -1;
        }

        /* محتوى الموقع */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* الشعار الرسمي */
        .ritual-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid var(--ritual-green);
            box-shadow: 0 0 30px var(--ritual-green);
            margin-bottom: 20px;
        }

        /* صندوق الفوسيت الزجاجي */
        .faucet-container {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 40px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        h1 {
            color: var(--ritual-green);
            letter-spacing: 5px;
            margin: 0 0 20px 0;
            font-size: 1.5rem;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--ritual-green);
            color: white;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        .btn-claim {
            width: 100%;
            padding: 18px;
            background: var(--ritual-green);
            color: black;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            display: none;
            transition: 0.3s;
        }

        .btn-claim:hover {
            background: white;
            box-shadow: 0 0 20px white;
        }

        /* الكاهن الواقعي (Shadow Figure) */
        .shaman-visual {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 800px;
            height: auto;
            pointer-events: none;
            z-index: 1;
            opacity: 0.8;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- فيديو خلفية لنيران واقعية جداً -->
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-green-particles-and-flames-in-the-dark-4008-large.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="main-content">
        <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo">
        
        <div class="faucet-container">
            <h1>RITUAL CEREMONY</h1>
            <p style="color: #ccc; margin-bottom: 20px;">The ritual awaits your word...</p>
            
            <input type="text" id="pass" placeholder="Type 'gritual'..." oninput="verify()">
            
            <button id="claimBtn" class="btn-claim" onclick="alert('Sent!')">Claim evrey token</button>
            
            <p style="font-size: 10px; color: #555; margin-top: 15px;">Waiting for anthor era of AI.</p>
        </div>
    </div>

    <!-- كاهن بتصميم Silhouette واقعي يرفع يديه -->
    <svg class="shaman-visual" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M100 150 L80 200 L120 200 Z" fill="#000" /> <!-- الجسد -->
        <circle cx="100" cy="140" r="10" fill="#000" /> <!-- الرأس -->
        <path d="M100 150 L60 110 M100 150 L140 110" stroke="#000" stroke-width="5" fill="none" /> <!-- الأيدي المرفوعة -->
    </svg>

    <script>
        function verify() {
            const val = document.getElementById('pass').value.toLowerCase();
            const btn = document.getElementById('claimBtn');
            if(val === "gritual") {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        }
    </script>
</body>
</html>
