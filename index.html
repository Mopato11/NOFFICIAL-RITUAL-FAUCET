<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Testnet - Sacred Faucet</title>
    <style>
        :root {
            --ritual-green: #00ff88;
            --dark-bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* حاوية البرق */
        #lightning-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* الشعار النابض */
        .logo-container {
            position: relative;
            z-index: 10;
            margin-bottom: 20px;
            animation: logo-pulse 3s infinite ease-in-out;
        }

        .ritual-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--ritual-green);
            box-shadow: 0 0 50px var(--ritual-green);
            background: #000;
        }

        @keyframes logo-pulse {
            0% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 10px var(--ritual-green)); }
            50% { transform: scale(1.1); filter: brightness(1.5) drop-shadow(0 0 40px var(--ritual-green)); }
            100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 10px var(--ritual-green)); }
        }

        /* الواجهة الزجاجية */
        .faucet-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 15px;
            padding: 40px;
            width: 360px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            z-index: 10;
            position: relative;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.6);
            border: none;
            border-bottom: 2px solid var(--ritual-green);
            color: white;
            font-size: 18px;
            text-align: center;
            outline: none;
            margin: 25px 0;
            box-sizing: border-box;
        }

        .btn-claim {
            background: var(--ritual-green);
            color: black;
            border: none;
            padding: 15px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
            display: none; 
            transition: 0.3s;
        }

        .btn-claim:hover {
            background: white;
            box-shadow: 0 0 30px white;
        }

        .candles-container {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 2;
            padding-bottom: 10px;
        }

        .candle { width: 15px; height: 45px; background: #111; position: relative; }
        .flame {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 10px; height: 18px; background: var(--ritual-green);
            border-radius: 50% 50% 20% 20%; filter: blur(1px);
            animation: flicker 0.1s infinite alternate; box-shadow: 0 0 10px var(--ritual-green);
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.7; }
            100% { transform: translateX(-52%) scale(1.2); opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="lightning-canvas"></canvas>

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
        <div class="logo-container">
            <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo">
        </div>

        <div class="faucet-card">
            <h1 style="margin:0; color: var(--ritual-green); font-size: 1.4rem; letter-spacing: 3px;">RITUAL TESTNET</h1>
            <p style="font-size: 11px; color: #888; margin-top: 5px;">IGNITE EVREY NODE IN THE NETWORK</p>
            
            <input type="text" id="ritualInput" placeholder="TYPE 'gritual' TO START" oninput="checkInput()">

            <button id="claimBtn" class="btn-claim" onclick="startRitual()">CLAIM EVREY TOKEN</button>
            
            <p style="font-size: 9px; color: #444; margin-top: 20px;">ANTHOR DROP IS COMING SOON</p>
        </div>
    </div>

    <div class="candles-container" id="candleRack"></div>

    <script>
        // 1. نظام البرق الأخضر
        const canvas = document.getElementById('lightning-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function drawLightning() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (Math.random() > 0.96) {
                let x = Math.random() * canvas.width;
                ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(x, 0);
                for (let i = 0; i < 15; i++) {
                    x += (Math.random() - 0.5) * 50;
                    ctx.lineTo(x, (canvas.height / 15) * (i + 1));
                }
                ctx.stroke();
                document.body.style.backgroundColor = '#0a1a11';
                setTimeout(() => { document.body.style.backgroundColor = '#050505'; }, 60);
            }
            requestAnimationFrame(drawLightning);
        }
        drawLightning();

        // 2. توليد الشموع
        const candleRack = document.getElementById('candleRack');
        for (let i = 0; i < 15; i++) {
            candleRack.innerHTML += `<div class="candle"><div class="flame"></div></div>`;
        }

        // 3. التحقق من الإدخال
        function checkInput() {
            const val = document.getElementById('ritualInput').value.toLowerCase();
            const btn = document.getElementById('claimBtn');
            btn.style.display = (val === "gritual") ? "block" : "none";
        }

        // 4. وظائف البلوكشين (Ritual Testnet)
        const RITUAL_CHAIN_ID = '0x8B'; // Chain ID 139 (Hex: 0x8B)

        async function setupRitualNetwork() {
            try {
                await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: 1979,
                        chainName: 'Ritual Testnet',
                        nativeCurrency: { name: 'Ritual', symbol: 'ritual', decimals: 18 },
                        rpcUrls: ['https://rpc.ritualfoundation.org/'], // تأكد من RPC الرسمي لـ Ritual
                        blockExplorerUrls: ['https://explorer.ritualfoundation.org/']
                    }]
                });
            } catch (error) {
                console.error("Could not add Ritual network", error);
            }
        }

        async function startRitual() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // ربط المحفظة
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const userWallet = accounts[0];

                    // إضافة وتبديل الشبكة إلى Ritual Testnet
                    await setupRitualNetwork();
                    
                    const btn = document.getElementById('claimBtn');
                    btn.innerText = "INVOKING RITUAL...";
                    btn.disabled = true;

                    // هنا يتم إرسال "الطقوس" أو المعاملة
                    setTimeout(() => {
                        alert("The energy has been summoned!\nCheck your wallet on Ritual Testnet for evrey token.\nAnthor ritual awaits.");
                        btn.innerText = "SUCCESSFUL";
                        btn.style.background = "#ffffff";
                    }, 3500);

                } catch (err) {
                    alert("Ritual interrupted: Please accept the connection.");
                }
            } else {
                alert("The ritual requires MetaMask to manifest.");
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
