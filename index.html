<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Lightning Ceremony</title>
    <style>
        :root {
            --ritual-green: #00ff88;
            --dark-bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Cinzel', serif;
            overflow: hidden;
        }

        /* حاوية البرق */
        #lightning-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* الشعار المشع والمتحرك */
        .logo-container {
            position: relative;
            z-index: 10;
            margin-bottom: 30px;
            animation: logo-pulse 3s infinite ease-in-out;
        }

        .ritual-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--ritual-green);
            box-shadow: 0 0 50px var(--ritual-green), inset 0 0 20px var(--ritual-green);
        }

        @keyframes logo-pulse {
            0% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 10px var(--ritual-green)); }
            50% { transform: scale(1.1); filter: brightness(1.5) drop-shadow(0 0 40px var(--ritual-green)); }
            100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 10px var(--ritual-green)); }
        }

        /* الواجهة الزجاجية الجميلة */
        .faucet-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 20px;
            padding: 50px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 10;
            position: relative;
        }

        /* خانة الكتابة الأنيقة */
        .input-group {
            position: relative;
            margin: 30px 0;
        }

        input {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--ritual-green);
            color: white;
            font-size: 20px;
            text-align: center;
            outline: none;
            transition: 0.5s;
            letter-spacing: 2px;
        }

        input:focus {
            border-bottom: 2px solid #fff;
            box-shadow: 0 10px 20px -10px var(--ritual-green);
        }

        /* أزرار المطالبة */
        .btn-claim {
            background: var(--ritual-green);
            color: black;
            border: none;
            padding: 15px 40px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
            display: none;
            width: 100%;
            border-radius: 5px;
        }

        .btn-claim:hover {
            background: white;
            box-shadow: 0 0 30px white;
        }

        /* الشموع (برمجية) */
        .candles-row {
            position: fixed;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 2;
        }

        .candle {
            width: 20px;
            height: 60px;
            background: #222;
            position: relative;
        }

        .flame {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 25px;
            background: var(--ritual-green);
            border-radius: 50% 50% 20% 20%;
            filter: blur(2px);
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.8; }
            100% { transform: translateX(-52%) scale(1.1); opacity: 1; }
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <canvas id="lightning-canvas"></canvas>

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
        
        <div class="logo-container">
            <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo">
        </div>

        <div class="faucet-card">
            <h1 style="margin:0; color: var(--ritual-green); font-size: 1.2rem;">THE SACRED ENERGY</h1>
            <p style="font-size: 10px; color: #666;">BRING LIFE TO EVREY NODE</p>
            
            <div class="input-group">
                <input type="text" id="ritualInput" placeholder="ENTER SECRET WORD..." oninput="check()">
            </div>

            <button id="claimBtn" class="btn-claim" onclick="alert('Ritual Power Sent!')">CLAIM EVREY TOKEN</button>
            
            <p style="font-size: 9px; color: #333; margin-top: 20px;">ANTHOR ERA BEGINS NOW</p>
        </div>
    </div>

    <!-- صف الشموع -->
    <div class="candles-row" id="candles"></div>

    <script>
        // كود البرق المتموج (JS Canvas)
        const canvas = document.getElementById('lightning-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function createLightning() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (Math.random() > 0.94) { // احتمالية ضرب البرق
                let x = Math.random() * canvas.width;
                let y = 0;
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x, y);

                for (let i = 0; i < 20; i++) {
                    x += (Math.random() - 0.5) * 60;
                    y += Math.random() * (canvas.height / 15);
                    ctx.lineTo(x, y);
                }
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#00ff88';
                ctx.stroke();
                
                // وميض الشاشة عند ضرب البرق
                document.body.style.backgroundColor = '#0a2215';
                setTimeout(() => { document.body.style.backgroundColor = '#050505'; }, 50);
            }
            requestAnimationFrame(createLightning);
        }
        createLightning();

        // إضافة الشموع
        const candleContainer = document.getElementById('candles');
        for (let i = 0; i < 12; i++) {
            candleContainer.innerHTML += `<div class="candle"><div class="flame"></div></div>`;
        }

        function check() {
            const val = document.getElementById('ritualInput').value.toLowerCase();
            const btn = document.getElementById('claimBtn');
            btn.style.display = (val === "gritual") ? "block" : "none";
        }
    </script>
</body>
</html>

// هذا الكود يوضع داخل <script> في أسفل ملف index.html
async function check() {
    const val = document.getElementById('ritualInput').value.toLowerCase();
    const btn = document.getElementById('claimBtn');
    
    // إذا كتب المستخدم الكلمة السرية يظهر الزر
    if(val === "gritual") {
        btn.style.display = "block";
    } else {
        btn.style.display = "none";
    }
}

async function startRitual() {
    // 1. التأكد من وجود MetaMask
    if (window.ethereum) {
        try {
            // 2. طلب إذن لربط المحفظة
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const address = accounts[0];
            
            // 3. تغيير شكل الزر لإعطاء حماس للمستخدم
            const btn = document.getElementById('claimBtn');
            btn.innerText = "SENDING EVREY TOKEN...";
            btn.style.background = "#ffffff";
            
            // محاكاة إرسال الطاقة (هنا تربطها بعقدك الذكي لاحقاً)
            setTimeout(() => {
                alert("The Ritual is complete! Tokens sent to: " + address);
                btn.innerText = "SUCCESSFUL";
            }, 3000);

        } catch (error) {
            alert("Ritual failed: You must connect your wallet.");
        }
    } else {
        alert("No magical wallet found. Please install MetaMask!");
    }
}
