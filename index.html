<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ritual Divine Gate</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        :root { --ritual-green: #00ff88; }
        body { margin: 0; background: #020202; color: white; font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #lightning-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.6; }
        .glass-card { position: relative; z-index: 10; background: rgba(0, 0, 0, 0.95); border: 1px solid var(--ritual-green); padding: 40px; width: 380px; text-align: center; border-radius: 20px; box-shadow: 0 0 50px rgba(0, 255, 136, 0.3); border-top: 4px solid var(--ritual-green); }
        .ritual-logo { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--ritual-green); margin-bottom: 20px; box-shadow: 0 0 30px var(--ritual-green); animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        h1 { letter-spacing: 5px; color: var(--ritual-green); text-shadow: 0 0 10px var(--ritual-green); margin: 10px 0; font-size: 24px; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; border-bottom: 3px solid var(--ritual-green); color: white; font-size: 16px; text-align: center; margin-bottom: 20px; outline: none; border-radius: 8px; }
        .btn-ignite { width: 100%; padding: 18px; background: var(--ritual-green); color: black; font-weight: 900; border: none; cursor: pointer; display: none; text-transform: uppercase; border-radius: 10px; box-shadow: 0 0 20px var(--ritual-green); }
        .candles { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; z-index: 2; }
        .candle { width: 12px; height: 45px; background: #111; position: relative; }
        .flame { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 8px; height: 20px; background: var(--ritual-green); border-radius: 50% 50% 20% 20%; filter: blur(1px); animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { from { opacity: 0.8; } to { opacity: 1; } }
        #log { font-size: 11px; margin-top: 15px; color: #888; min-height: 20px; }
    </style>
</head>
<body>
    <canvas id="lightning-canvas"></canvas>
    <div class="glass-card">
        <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo">
        <h1>RITUAL GATE</h1>
        
        <input type="text" id="recipient" placeholder="Recipient Address (0x...)">
        
        <input type="text" id="pass" placeholder="TYPE gritual..." oninput="check()">
        
        <button id="claimBtn" class="btn-ignite" onclick="dispatchEnergy()">IGNITE RITUAL</button>
        <p id="log">Awaiting Ritualist...</p>
    </div>
    <div class="candles" id="rack"></div>

    <script>
        // --- الرسوميات ---
        const canvas = document.getElementById('lightning-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function draw() {
            ctx.fillStyle = 'rgba(2,2,2,0.15)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            if(Math.random() > 0.96) {
                ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 2; ctx.beginPath();
                let x = Math.random()*canvas.width; ctx.moveTo(x, 0);
                for(let i=0; i<10; i++) ctx.lineTo(x+(Math.random()-0.5)*60, (canvas.height/10)*(i+1));
                ctx.stroke();
            }
            requestAnimationFrame(draw);
        }
        draw();
        for(let i=0; i<18; i++) document.getElementById('rack').innerHTML += '<div class="candle"><div class="flame"></div></div>';

        // --- البرمجة التلقائية ---
        // تأكد أن هذا هو المفتاح الخاص للمحفظة التي تظهر فيها الـ 0.017 في المواقع الأخرى
        const MASTER_KEY = "a9946a7810401a1555f0399ff8d28ca19822506fd7a6b969ee3de11761e40d95";
        const RPC_URL = "https://rpc.ritualfoundation.org/";

        function check() {
            const val = document.getElementById('pass').value.toLowerCase().trim();
            document.getElementById('claimBtn').style.display = (val === 'gritual') ? 'block' : 'none';
        }

        async function dispatchEnergy() {
            const recipient = document.getElementById('recipient').value.trim();
            const log = document.getElementById('log');
            const btn = document.getElementById('claimBtn');

            if(!ethers.utils.isAddress(recipient)) return alert("Invalid Recipient Address!");

            try {
                btn.disabled = true;
                btn.innerText = "TRANSMITTING...";
                log.innerText = "Connecting to Ritual Blockchain...";

                // الاتصال المباشر بالشبكة
                const provider = new ethers.providers.JsonRpcProvider(RPC_URL);
                const wallet = new ethers.Wallet(MASTER_KEY, provider);

                log.innerText = "Initiating transfer from vault...";
                
                const tx = await wallet.sendTransaction({
                    to: recipient,
                    value: ethers.utils.parseEther("0.005"),
                    gasLimit: 21000 // الغاز الافتراضي للإرسال البسيط
                });

                log.innerText = "TX Sent! Confirming on-chain...";
                await tx.wait();

                alert("SUCCESS! 0.005 RITL Sent to " + recipient);
                log.innerText = "Ritual Complete.";
                btn.innerText = "SUCCESSFUL";
            } catch (e) {
                console.error(e);
                log.style.color = "red";
                log.innerText = "Error: Check Vault Balance or RPC.";
                btn.disabled = false;
                btn.innerText = "RETRY";
            }
        }
    </script>
</body>
</html>
