<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Shaman Faucet</title>
    <style>
        :root {
            --ritual-green: #00ff88;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* خلفية سوداء في حال فشل الصورة */
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* حاوية الخلفية */
        .bg-wrap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            /* هنا نحاول استدعاء الصورة محلياً من ملفاتك */
            background-image: url('shaman.jpg'), url('https://i.ibb.co/6RTPZ0S/N6p34ztp.jpg');
            background-size: cover;
            background-position: center;
            animation: zoomSlow 15s infinite alternate;
        }

        @keyframes zoomSlow {
            from { transform: scale(1); filter: brightness(0.6); }
            to { transform: scale(1.1); filter: brightness(0.9); }
        }

        /* تأثير الضباب والنيران الخضراء */
        .mist {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(0, 255, 136, 0.3), transparent);
            filter: blur(50px);
            z-index: -1;
        }

        .main-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            z-index: 10;
            position: relative;
        }

        .logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--ritual-green);
            box-shadow: 0 0 25px var(--ritual-green);
            margin-bottom: 20px;
        }

        .card {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--ritual-green);
            padding: 35px;
            width: 340px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid var(--ritual-green);
            color: var(--ritual-green);
            text-align: center;
            margin: 20px 0;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--ritual-green);
            color: #000;
            font-weight: bold;
            border: none;
            cursor: pointer;
            display: none;
        }

        /* جزيئات طائرة */
        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--ritual-green);
            box-shadow: 0 0 10px var(--ritual-green);
            border-radius: 50%;
            animation: fly 3s infinite linear;
        }

        @keyframes fly {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-wrap"></div>
    <div class="mist"></div>

    <div class="main-ui">
        <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="logo">
        <div class="card">
            <h2 style="color: var(--ritual-green);">RITUAL GATE</h2>
            <p style="font-size: 13px;">The shaman needs evrey soul to ignite.</p>
            <input type="text" id="input" placeholder="Type gritual..." oninput="verify()">
            <button id="btn" class="btn" onclick="alert('Sent!')">CLAIM EVREY TOKEN</button>
            <p style="font-size: 10px; color: #444; margin-top: 10px;">Waiting for anthor era.</p>
        </div>
    </div>

    <script>
        function verify() {
            const val = document.getElementById('input').value.toLowerCase();
            const btn = document.getElementById('btn');
            btn.style.display = (val === "gritual") ? "block" : "none";
        }

        // إضافة جزيئات طائرة لتعويض غياب الصورة لو لم تظهر
        for(let i=0; i<30; i++) {
            let s = document.createElement('div');
            s.className = 'spark';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.bottom = '0';
            s.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(s);
        }
    </script>
</body>
</html>
