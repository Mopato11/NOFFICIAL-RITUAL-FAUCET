<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Gasless Faucet</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        :root { --ritual-green: #00ff88; --dark-bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--dark-bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* تصميم البرق */
        #lightning-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        .main-content { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative; z-index: 10; }
        
        /* الشعار النابض */
        .ritual-logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--ritual-green); box-shadow: 0 0 50px var(--ritual-green); animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.1); filter: brightness(1.4); } }
        
        /* بطاقة الفوسيت */
        .faucet-card { background: rgba(0, 0, 0, 0.9); border: 1px solid var(--ritual-green); padding: 40px; width: 360px; text-align: center; backdrop-filter: blur(15px); border-radius: 15px; }
        
        input { width: 100%; padding: 15px; background: #000; border: none; border-bottom: 2px solid var(--ritual-green); color: white; font-size: 18px; text-align: center; margin-bottom: 20px; outline: none; }
        
        .btn-claim { width: 100%; padding: 16px; background: var(--ritual-green); color: black; font-weight: 900; border: none; cursor: pointer; display: none; text-transform: uppercase; border-radius: 5px; transition: 0.3s; }
        .btn-claim:hover { background: white; box-shadow: 0 0 30px white; }

        /* الشموع */
        .candles-container { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; z-index: 2; }
        .candle { width: 15px; height: 45px; background: #111; position: relative; }
        .flame { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 10px; height: 18px; background: var(--ritual-green); border-radius: 50%; filter: blur(1px); animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { from { opacity: 0.8; transform: scale(1); } to { opacity: 1; transform: scale(1.2); } }
    </style>
</head>
<body>

    <canvas id="lightning-canvas"></canvas>

    <div class="main-content">
        <div style="margin-bottom: 30px;">
            <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo">
        </div>

        <div class="faucet-card">
            <h1 style="color: var(--ritual-green); letter-spacing: 4px; margin: 0;">GASLESS GATE</h1>
            <p style="font-size: 10px; color: #888; margin-bottom: 20px;">FREE 0.005 RITL - NO GAS NEEDED</p>
            
            <input type="text" id="userInput" placeholder="TYPE gritual..." oninput="checkKey()">
            
            <button id="claimBtn" class="btn-claim" onclick="sendAutomatedTokens()">CLAIM ENERGY</button>
            
            <p id="log" style="font-size: 11px; color: var(--ritual-green); margin-top: 15px;"></p>
        </div>
    </div>

    <div class="candles-container" id="candleRack"></div>

    <script>
        // 1. نظام البرق والشموع (التصميم الأصلي)
        const canvas = document.getElementById('lightning-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function drawLightning() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (Math.random() > 0.96) {
                let x = Math.random()*canvas.width; ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x, 0);
                for (let i=0; i<10; i++) ctx.lineTo(x+(Math.random()-0.5)*50, (canvas.height/10)*(i+1));
                ctx.stroke();
                document.body.style.backgroundColor = '#0a1a11';
                setTimeout(() => { document.body.style.backgroundColor = '#050505'; }, 60);
            }
            requestAnimationFrame(drawLightning);
        }
        drawLightning();
        const rack = document.getElementById('candleRack');
        for (let i=0; i<15; i++) rack.innerHTML += '<div class="candle"><div class="flame"></div></div>';

        // 2. التحقق من الكلمة
        function checkKey() {
            const val = document.getElementById('userInput').value.toLowerCase().trim();
            document.getElementById('claimBtn').style.display = (val === "gritual") ? "block" : "none";
        }

        // 3. الإرسال الآلي (أنت تدفع الغاز عن المستخدم)
        async function sendAutomatedTokens() {
            if (!window.ethereum) return alert("Please install MetaMask to detect your address!");
            
            const btn = document.getElementById('claimBtn');
            const log = document.getElementById('log');

            try {
                // الحصول على عنوان المستخدم
                const userProvider = new ethers.providers.Web3Provider(window.ethereum);
                const accounts = await userProvider.send("eth_requestAccounts", []);
                const userAddress = accounts[0];

                btn.disabled = true;
                btn.innerText = "SUMMONING...";
                log.innerText = "Executing gasless ritual...";

                // محفظة التوزيع (تستخدم مفتاحك الخاص)
                const PRIVATE_KEY = "a9946a7810401a1555f0399ff8d28ca19822506fd7a6b969ee3de11761e40d95";
                const rpcProvider = new ethers.providers.JsonRpcProvider("https://rpc.ritual.net");
                const faucetWallet = new ethers.Wallet(PRIVATE_KEY, rpcProvider);

                // إرسال المعاملة (أنت تدفع الغاز هنا)
                const tx = await faucetWallet.sendTransaction({
                    to: userAddress,
                    value: ethers.utils.parseEther("0.005")
                });

                log.innerText = "Energy sent! Confirming on block...";
                await tx.wait();

                alert("Success! 0.005 RITL arrived to " + userAddress);
                btn.innerText = "SUCCESSFUL";
                log.innerText = "Ritual complete. Energy restored.";

            } catch (err) {
                console.error(err);
                alert("Ritual failed! Make sure the faucet wallet has enough RITL.");
                btn.disabled = false;
                btn.innerText = "CLAIM ENERGY";
                log.innerText = "";
            }
        }
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
