<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ritual Free Faucet</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        :root { --green: #00ff88; }
        body { margin: 0; background: #050505; color: white; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { background: #000; padding: 30px; border: 1px solid var(--green); border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 0 20px var(--green); }
        input { width: 100%; padding: 12px; background: #111; border: none; border-bottom: 2px solid var(--green); color: white; margin: 20px 0; text-align: center; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--green); color: black; font-weight: bold; border: none; cursor: pointer; display: none; text-transform: uppercase; }
        #status { font-size: 11px; margin-top: 15px; color: var(--green); }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="letter-spacing: 3px;">RITUAL GATE</h2>
        <input type="text" id="pass" placeholder="TYPE gritual..." oninput="check()">
        <button id="claimBtn" class="btn" onclick="startClaim()">CLAIM 0.005 RITL</button>
        <p id="status">Ready to summon energy...</p>
    </div>

    <script>
        // هذا الكود سيستخدم المحفظة المشحونة التي تفتحها في ميتاماسك
        function check() {
            document.getElementById('claimBtn').style.display = 
                (document.getElementById('pass').value.toLowerCase() === 'gritual') ? 'block' : 'none';
        }

        async function startClaim() {
            const btn = document.getElementById('claimBtn');
            const status = document.getElementById('status');
            
            try {
                if (!window.ethereum) return alert("Install MetaMask!");
                
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                const userAddress = accounts[0];

                btn.disabled = true;
                btn.innerText = "SENDING...";
                status.innerText = "Please confirm the transaction in MetaMask...";

                // المفتاح الذي أرسلته أنت
                const KEY = "a9946a7810401a1555f0399ff8d28ca19822506fd7a6b969ee3de11761e40d95";
                const rpcProvider = new ethers.providers.JsonRpcProvider("https://rpc.ritual.net");
                const faucetWallet = new ethers.Wallet(KEY, rpcProvider);

                // إرسال العملات
                const tx = await faucetWallet.sendTransaction({
                    to: userAddress,
                    value: ethers.utils.parseEther("0.005")
                });

                status.innerText = "Energy is traveling... wait for block.";
                await tx.wait();

                alert("SUCCESS! 0.005 RITL Sent.");
                btn.innerText = "SUCCESSFUL";
            } catch (err) {
                console.error(err);
                status.style.color = "red";
                status.innerText = "FAILED: " + (err.reason || "Check Balance in 0x7f48...");
                btn.disabled = false;
                btn.innerText = "TRY AGAIN";
            }
        }
    </script>
</body>
</html>
