<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Secret Faucet</title>
    <style>
        :root {
            --ritual-green: #00ff88;
            --deep-black: #020202;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--deep-black);
            font-family: 'Courier New', Courier, monospace;
            color: white;
            overflow: hidden;
        }

        /* خلفية النيران والطقوس */
        .ritual-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, var(--deep-black) 90%);
            z-index: 1;
        }

        /* النيران الخضراء في الأسفل */
        .fire-bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to top, var(--ritual-green), transparent);
            filter: blur(50px);
            opacity: 0.3;
            z-index: 0;
            animation: flicker 2s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.2; transform: scaleY(1); }
            100% { opacity: 0.4; transform: scaleY(1.2); }
        }

        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        /* تصميم الشعار الدائري */
        .logo-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
        }

        .ritual-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--ritual-green);
            box-shadow: 0 0 30px var(--ritual-green);
            object-fit: cover;
            animation: rotate-slow 10s infinite linear;
        }

        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .flame-particle {
            position: absolute;
            background: var(--ritual-green);
            border-radius: 50%;
            filter: blur(8px);
            opacity: 0.6;
            animation: rise 4s infinite linear;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.6; }
            100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 10px var(--ritual-green);
            margin: 10px 0;
            letter-spacing: 3px;
        }

        .faucet-card {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--ritual-green);
            padding: 30px;
            border-radius: 15px;
            width: 380px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.1);
        }

        input {
            width: 100%;
            padding: 15px;
            background: #111;
            border: 1px solid var(--ritual-green);
            color: var(--ritual-green);
            border-radius: 8px;
            font-size: 1.1rem;
            text-align: center;
            margin: 20px 0;
            outline: none;
        }

        .btn-claim {
            width: 100%;
            padding: 15px;
            background: var(--ritual-green);
            color: black;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-claim:hover {
            background: white;
            box-shadow: 0 0 30px white;
        }

        .ritual-text {
            font-size: 0.8rem;
            color: #555;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="fire-bottom"></div>
    <div class="ritual-overlay" id="fireField"></div>

    <div class="main-container">
        <div class="logo-wrapper">
            <!-- الشعار الذي طلبته -->
            <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-image" alt="Ritual Logo">
        </div>

        <h1>UNOFFICIAL FAUCET</h1>
        
        <div class="faucet-card">
            <p>Welcome to the digital ritual.</p>
            <p style="color: var(--ritual-green);">Enter the secret word to ignite the claim:</p>
            
            <input type="text" id="passphrase" placeholder="gritual..." oninput="verifyRitual()">
            
            <button id="claimBtn" class="btn-claim" onclick="executeRitual()">Claim evrey token</button>
            
            <p class="ritual-text">Prepare for anthor era of AI infrastructure.</p>
        </div>
    </div>

    <script>
        // توليد نيران خضراء تتطاير في كل الموقع
        const fireField = document.getElementById('fireField');
        for (let i = 0; i < 40; i++) {
            let p = document.createElement('div');
            p.className = 'flame-particle';
            let size = Math.random() * 40 + 10 + 'px';
            p.style.width = size;
            p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.bottom = "-50px";
            p.style.animationDuration = Math.random() * 3 + 2 + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            fireField.appendChild(p);
        }

        function verifyRitual() {
            const val = document.getElementById('passphrase').value.toLowerCase();
            const btn = document.getElementById('claimBtn');
            if (val === "gritual") {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        }

        function executeRitual() {
            alert("The ritual is complete! Tokens are sent to evrey participant.");
        }
    </script>
</body>
</html>
