<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Shaman Faucet</title>
    <style>
        :root {
            --ritual-green: #00ff88;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* حاوية مشهد الكاهن */
        .ritual-wrap {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            background: radial-gradient(circle at bottom, rgba(0, 255, 136, 0.15) 0%, #050505 70%);
        }

        /* تصميم الكاهن الملحمي (SVG) */
        .shaman-svg {
            width: 500px;
            height: auto;
            z-index: 5;
            filter: drop-shadow(0 0 20px var(--ritual-green));
            animation: sway 4s infinite alternate ease-in-out;
        }

        @keyframes sway {
            from { transform: translateY(0px) scale(1); }
            to { transform: translateY(-15px) scale(1.02); }
        }

        /* النيران الخضراء المتوهجة */
        .glow-fire {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 300px;
            background: linear-gradient(to top, var(--ritual-green), transparent);
            opacity: 0.2;
            filter: blur(80px);
            z-index: 1;
        }

        /* واجهة المستخدم */
        .ui-content {
            position: absolute;
            top: 50px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
        }

        .ritual-logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--ritual-green);
            box-shadow: 0 0 30px var(--ritual-green);
            margin-bottom: 20px;
        }

        .faucet-box {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--ritual-green);
            padding: 35px;
            width: 350px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.1);
        }

        input {
            width: 100%;
            padding: 15px;
            background: #111;
            border: 1px solid var(--ritual-green);
            color: var(--ritual-green);
            margin: 20px 0;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            font-weight: bold;
        }

        .btn-ignite {
            width: 100%;
            padding: 18px;
            background: var(--ritual-green);
            color: #000;
            font-weight: bold;
            border: none;
            cursor: pointer;
            display: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-ignite:hover { background: #fff; box-shadow: 0 0 20px #fff; }

    </style>
</head>
<body>

    <div class="ui-content">
        <!-- الشعار الذي طلبته -->
        <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo">
        <h1 style="color: var(--ritual-green); letter-spacing: 5px; text-shadow: 0 0 10px var(--ritual-green);">RITUAL FAUCET</h1>
        
        <div class="faucet-box">
            <p>Prove your devotion to the ritual.</p>
            <input type="text" id="secret" placeholder="Type gritual..." oninput="check()">
            <button id="claimBtn" class="btn-ignite" onclick="alert('Sent!')">Claim evrey token</button>
            <p style="font-size: 10px; color: #444; margin-top: 15px;">Waiting for anthor drop</p>
        </div>
    </div>

    <div class="ritual-wrap">
        <div class="glow-fire"></div>
        
        <!-- رسم الكاهن يدوياً بالكود لضمان ظهوره -->
        <svg class="shaman-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- رداء الكاهن -->
            <path d="M100 40 L60 180 L140 180 Z" fill="#000" stroke="#00ff88" stroke-width="1"/>
            <!-- الرأس والغطاء -->
            <path d="M100 30 Q115 30 115 50 Q100 60 85 50 Q85 30 100 30" fill="#000" stroke="#00ff88" stroke-width="1"/>
            <!-- اليد اليسرى مرفوعة -->
            <path d="M85 70 L40 30" stroke="#000" stroke-width="8" stroke-linecap="round"/>
            <path d="M85 70 L40 30" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
            <!-- اليد اليمنى مرفوعة -->
            <path d="M115 70 L160 30" stroke="#000" stroke-width="8" stroke-linecap="round"/>
            <path d="M115 70 L160 30" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
            <!-- نيران تخرج من اليدين -->
            <circle cx="40" cy="30" r="5" fill="#00ff88">
                <animate attributeName="r" values="5;10;5" dur="1s" repeatCount="indefinite" />
            </circle>
            <circle cx="160" cy="30" r="5" fill="#00ff88">
                <animate attributeName="r" values="5;10;5" dur="1s" repeatCount="indefinite" />
            </circle>
        </svg>
    </div>

    <script>
        function check() {
            const val = document.getElementById('secret').value.toLowerCase();
            const btn = document.getElementById('claimBtn');
            if(val === "gritual") {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        }
    </script>
</body>
</html>
