<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Secret Faucet</title>
    <style>
        :root {
            --ritual-green: #00ff88;
            --flame-glow: rgba(0, 255, 136, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Cinzel', serif; /* خط يوحي بالطقوس القديمة */
            color: white;
            overflow: hidden;
        }

        /* خلفية سينمائية: شخص يرتدي لباس طقوس مع نيران خضراء */
        .background-shroud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* استخدام صورة تعبيرية تمثل الطقوس والنيران الخضراء */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1519608487953-e999c86e7455?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            filter: grayscale(0.5) contrast(1.2);
            z-index: -2;
        }

        /* طبقة النيران الخضراء المتحركة (الفلتر) */
        .green-fire-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom, var(--flame-glow) 0%, transparent 70%);
            mix-blend-mode: screen;
            animation: flicker 3s infinite alternate;
            z-index: -1;
        }

        @keyframes flicker {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.05); }
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            z-index: 10;
        }

        /* الشعار الذي أرسلته مع توهج أخضر */
        .ritual-logo-main {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--ritual-green);
            box-shadow: 0 0 50px var(--ritual-green);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px var(--ritual-green); }
            50% { box-shadow: 0 0 60px var(--ritual-green); }
            100% { box-shadow: 0 0 20px var(--ritual-green); }
        }

        .faucet-ui {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--ritual-green);
            padding: 40px;
            border-radius: 5px; /* حواف حادة لتبدو أكثر جدية */
            box-shadow: inset 0 0 20px var(--flame-glow);
            max-width: 450px;
        }

        h1 {
            letter-spacing: 8px;
            color: var(--ritual-green);
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--ritual-green);
            color: white;
            font-size: 20px;
            text-align: center;
            padding: 10px;
            margin-bottom: 30px;
            outline: none;
        }

        .claim-btn {
            background: var(--ritual-green);
            color: black;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
            transition: 0.5s;
            text-transform: uppercase;
        }

        .claim-btn:hover {
            background: white;
            letter-spacing: 3px;
        }

        /* إضافة شخصية الطقوس (Shadow Figure) */
        .shaman-figure {
            position: absolute;
            bottom: 0;
            right: 5%;
            height: 70%;
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
    <!-- استدعاء خطوط مناسبة للطقوس -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-shroud"></div>
    <div class="green-fire-overlay"></div>

    <div class="main-content">
        <!-- الشعار المطلوب -->
        <img src="https://pbs.twimg.com/profile_images/2047761933764268032/ltdZOulq_400x400.jpg" class="ritual-logo-main" alt="Ritual Logo">
        
        <h1>UNOFFICIAL FAUCET</h1>

        <div class="faucet-ui">
            <p style="font-size: 0.9rem; color: #888;">Complete the ceremony to receive your tokens.</p>
            
            <input type="text" id="secretWord" placeholder="Type 'gritual'..." oninput="validate()">
            
            <button id="igniteBtn" class="claim-btn" onclick="finish()">Claim evrey token</button>
            
            <p id="hint" style="margin-top: 15px; font-size: 0.8rem;">Ready for anthor ritual?</p>
        </div>
    </div>

    <script>
        function validate() {
            const val = document.getElementById('secretWord').value.toLowerCase();
            const btn = document.getElementById('igniteBtn');
            if (val === "gritual") {
                btn.style.display = "inline-block";
            } else {
                btn.style.display = "none";
            }
        }

        function finish() {
            alert("The ritual is sealed. Your tokens are coming!");
        }
    </script>
</body>
</html>
