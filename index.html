<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ritual Master Faucet</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        :root { --neon: #00ff88; }
        body { margin: 0; background: #050505; color: white; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #000; padding: 30px; border: 1px solid var(--neon); border-radius: 15px; width: 380px; text-align: center; box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        input { width: 100%; padding: 12px; background: #111; border: none; border-bottom: 2px solid var(--neon); color: white; margin: 15px 0; text-align: center; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--neon); color: black; font-weight: bold; border: none; cursor: pointer; display: none; border-radius: 5px; }
        #debug { font-size: 10px; margin-top: 15px; color: #888; text-align: left; background: #111; padding: 10px; border-radius: 5px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="letter-spacing: 2px; color: var(--neon);">RITUAL GATE</h2>
        <input type="text" id="pass" placeholder="Type gritual..." oninput="check()">
        <button id="claimBtn" class="btn" onclick="distribute()">CLAIM ENERGY</button>
        
        <div id="debug">🔍 Checking Vault Status...</div>
    </div>

    <script>
        // ضع مفتاحك هنا
        const MASTER_KEY = "a9946a7810401a1555f0399ff8d28ca19822506fd7a6b969ee3de11761e40d95"; 
        const RPC = "https://rpc.ritual.net";

        async function updateStatus() {
            const debug = document.getElementById('debug');
            try {
                const provider = new ethers.providers.JsonRpcProvider(RPC);
                const wallet = new ethers.Wallet(MASTER_KEY, provider);
                const balance = await provider.getBalance(wallet.address);
                const eth = ethers.utils.formatEther(balance);
                
                debug.innerHTML = `
                    <b>Vault Address:</b> <span style="color:#fff">${wallet.address}</span><br>
                    <b>Balance:</b> <span style="color:${eth < 0.006 ? 'red' : '#00ff88'}">${eth} RITL</span><br>
                    ${eth < 0.006 ? '❌ <span style="color:red">Status: Needs Funds!</span>' : '✅ <span style="color:#00ff88">Status: Active</span>'}
                `;
            } catch (e) {
                debug.innerText = "Connection Error. Check Network.";
            }
        }
        updateStatus();

        function check() {
            document.getElementById('claimBtn').style.display = 
                (document.getElementById('pass').value.toLowerCase() === 'gritual') ? 'block' : 'none';
        }

        async function distribute() {
            const btn = document.getElementById('claimBtn');
            const debug = document.getElementById('debug');
            try {
                const userProvider = new ethers.providers.Web3Provider(window.ethereum);
                const accounts = await userProvider.send("eth_requestAccounts", []);
                
                btn.disabled = true; btn.innerText = "SENDING...";
                
                const provider = new ethers.providers.JsonRpcProvider(RPC);
                const faucetWallet = new ethers.Wallet(MASTER_KEY, provider);

                const tx = await faucetWallet.sendTransaction({
                    to: accounts[0],
                    value: ethers.utils.parseEther("0.005")
                });

                debug.innerText = "Confirming on Blockchain...";
                await tx.wait();
                alert("Energy sent successfully!");
                location.reload();
            } catch (err) {
                console.error(err);
                alert("Ritual Failed: Check the balance in the black box.");
                btn.disabled = false; btn.innerText = "RETRY";
            }
        }
    </script>
</body>
</html>
